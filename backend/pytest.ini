[pytest]
# §19.D Pytest configuration — LOCKED per BACKEND_ARCHITECTURE.md §19.D.
#
# asyncio_mode = "auto"            — every async fixture / test is awaited.
# asyncio_default_fixture_loop_scope = session
#                                  — dev_engine + session-scoped fixtures
#                                    bind to a session loop. Function-scoped
#                                    fixtures override with loop_scope="function".
# testpaths = tests                — backend-rooted; `cd backend && pytest`.
# filterwarnings = ignore::DeprecationWarning
#                                  — Pillow / asyncpg upstream noise.
# markers                          — 6 markers per §19.D + ``perf`` for §19.E.
# addopts = --strict-markers       — block typos and unregistered markers.
#         = --strict-config        — block typos in this file itself.
#         = -ra                    — short summary of skipped / failed tests.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
# pythonpath = . — additive per ci-activation Gate-1 fix (2026-06-11);
# founder pre-OK'd §19.D-locked amendment (infra inter-lead, run 27318816408).
# Makes bare `pytest` (CI) match `python -m pytest` (local) for `import app`.
pythonpath = .
filterwarnings = ignore::DeprecationWarning
markers =
    unit: pure-function tests, no I/O (§19.D)
    integration: real DB + Valkey via dev tunnel (§19.D)
    golden_roundtrip: 15 XLSX round-trip fixtures per §14.K
    ai_eval: golden AI eval sets per §6A.H (runs weekly, gated by RUN_AI_EVAL=1)
    slow: tests that exceed 5s wall time (gated by PYTEST_RUN_SLOW=1)
    smoke: boot + DB schema smoke tests
    perf: performance budget assertions per §19.E (always paired with `slow`)
addopts =
    --strict-markers
    --strict-config
    -ra
