[alembic]
# svc-image standalone Alembic chain.
# This chain is ENTIRELY SEPARATE from the monolith chain at backend/alembic/.
# It tracks exactly one revision: the public→image schema move for the
# `product_images` table.  All subsequent svc-image schema changes also land here.
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally BLANK.
# The URL is injected at runtime via DATABASE_URL environment variable
# (passed to create_async_engine in alembic/env.py), so that
# percent-encoded password characters never pass through configparser
# interpolation.  See env.py NOTE comment for details.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
