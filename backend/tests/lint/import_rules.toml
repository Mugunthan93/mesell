# §19.C Contracts 1-7 — import-linter rule set per §16.E.
#
# All contracts MUST pass in CI; a single violation fails the build.
# Invoke via ``lint-imports --config tests/lint/import_rules.toml`` from
# the ``backend/`` directory.
#
# Three implementation notes vs the §16.E sketch:
#
# 1. **TOML namespace.** §16.E uses bare ``[importlinter]`` for clarity. The
#    runtime ``import-linter`` package requires the ``[tool.importlinter]``
#    namespace when loading TOML config (per
#    ``importlinter.adapters.user_options.TomlFileUserOptionReader``).
#
# 2. **Per-source expansion of "module-private" rules.** import-linter's
#    ``forbidden`` contract rejects source/forbidden pairs that share
#    descendants — e.g. ``source=app.modules.iam`` + ``forbidden=
#    app.modules.iam.repository`` is structurally rejected. The §16.E
#    intent of "module X.* MUST NOT import module Y.<private> for X ≠ Y"
#    is therefore expanded into one sub-contract per source module, whose
#    ``forbidden_modules`` list excludes that source module's own private
#    files. Semantic count remains the §19.C "7 logical import-linter
#    contracts" + 3 AST scanners.
#
# 3. **Intra-module self-import allowlist.** Every domain module re-exports
#    its router via ``__init__.py`` so ``app/main.py`` can mount it
#    (per §16.B locked pattern). When a cross-module service-to-service
#    call uses ``from app.modules.other import ...``, Python's import system
#    pulls in the re-export side-effect, which import-linter sees as a
#    transitive chain. The intra-module self-imports below allowlist these
#    re-export chains without weakening cross-module enforcement.
#    ``unmatched_ignore_imports_alerting = "none"`` lets the same kitchen-sink
#    list serve every sub-contract — entries that don't apply to a given
#    contract are silently skipped.
#
# Contracts 8-10 (custom AST scanners) live as sibling files:
#   * check_scope_to_user.py                       (§15.B + §16.F.2)
#   * check_no_meesho_symbols_outside_export.py    (§14.J + §15.F + L_export_M10)
#   * check_message_id_regex.py                    (§5A.H)

[tool.importlinter]
root_package = "app"
include_external_packages = false


# ============================================================================
# Contract 1 — repository.py is PRIVATE per §16.C Rule 2 + §19.C
# Expansion: 8 sub-contracts, one per source domain module. dashboard has no
# repository per §16.F.1 so the dashboard sub-contract forbids all 7 OTHER
# repositories; the other 7 sub-contracts exclude their own repository.
# ============================================================================

[[tool.importlinter.contracts]]
name = "Contract 1.iam — iam does not import other modules' repository"
type = "forbidden"
source_modules = ["app.modules.iam"]
forbidden_modules = [
    "app.modules.customer.repository",
    "app.modules.category.repository",
    "app.modules.catalog.repository",
    "app.modules.image.repository",
    "app.modules.pricing.repository",
    "app.modules.export.repository",
]
unmatched_ignore_imports_alerting = "none"
ignore_imports = [
    # __init__.py router re-exports — §16.B locked pattern.
    "app.modules.iam -> app.modules.iam.router",
    "app.modules.customer -> app.modules.customer.router",
    "app.modules.category -> app.modules.category.router",
    "app.modules.catalog -> app.modules.catalog.router",
    "app.modules.image -> app.modules.image.router",
    "app.modules.pricing -> app.modules.pricing.router",
    "app.modules.dashboard -> app.modules.dashboard.router",
    "app.modules.export -> app.modules.export.router",
    # Intra-module: router → service.
    "app.modules.iam.router -> app.modules.iam.service",
    "app.modules.customer.router -> app.modules.customer.service",
    "app.modules.category.router -> app.modules.category.service",
    "app.modules.catalog.router -> app.modules.catalog.service",
    "app.modules.image.router -> app.modules.image.service",
    "app.modules.pricing.router -> app.modules.pricing.service",
    "app.modules.dashboard.router -> app.modules.dashboard.service",
    "app.modules.export.router -> app.modules.export.service",
    # Intra-module: service → repository (own repo only — that IS what we
    # want each service to use; the §16.E sketch's ignore_imports self-import
    # carve-out).
    "app.modules.iam.service -> app.modules.iam.repository",
    "app.modules.customer.service -> app.modules.customer.repository",
    "app.modules.category.service -> app.modules.category.repository",
    "app.modules.catalog.service -> app.modules.catalog.repository",
    "app.modules.image.service -> app.modules.image.repository",
    "app.modules.pricing.service -> app.modules.pricing.repository",
    "app.modules.export.service -> app.modules.export.repository",
    # Lazy intra-module: service <-> tasks (image, export only per §3.I).
    "app.modules.image.service -> app.modules.image.tasks",
    "app.modules.image.tasks -> app.modules.image.service",
    "app.modules.image.tasks -> app.modules.image.repository",
    "app.modules.export.service -> app.modules.export.tasks",
    "app.modules.export.tasks -> app.modules.export.service",
    "app.modules.export.tasks -> app.modules.export.repository",
]

