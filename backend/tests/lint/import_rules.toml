# ============================================================================
# Contract 2 — adapters/gemini.py is consumed ONLY via ai_ops/client.py
# (§16.D.2 + §3.G — the single most important boundary per §16).
# Domain modules MUST NEVER import app.adapters.gemini directly.
# ai_ops/client.py is in app.ai_ops (NOT app.modules) so it bypasses this rule.
#
# Transitive-chain allowlist:
#   * `ai_ops.client → adapters.gemini` is the locked single-import-surface
#     edge per §3.G + §16.D.2. This edge MUST NOT count when checking that
#     the 8 domain modules don't transitively reach adapters.gemini through
#     the legitimate ai_ops.client wrapper.
# ============================================================================
[[tool.importlinter.contracts]]
name = "Contract 2 — domain modules MUST NOT import adapters.gemini"
type = "forbidden"
source_modules = [
    "app.modules.iam",
    "app.modules.customer",
    "app.modules.category",
    "app.modules.catalog",
    "app.modules.image",
    "app.modules.pricing",
    "app.modules.dashboard",
    "app.modules.export",
]
forbidden_modules = ["app.adapters.gemini"]
unmatched_ignore_imports_alerting = "none"
ignore_imports = [
    # The single locked import surface per §3.G — ai_ops.client wraps the
    # adapter. Counting this edge would render every domain module non-compliant.
    "app.ai_ops.client -> app.adapters.gemini",
]


