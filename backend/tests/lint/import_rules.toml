# ============================================================================
# Contract 5 — ai_ops/ consumed ONLY by category, catalog, image
# Per §6A.A + §16.D.3 — the 3 AI workload modules.
# The other 5 (iam, customer, pricing, dashboard, export) MUST NOT import ai_ops.
#
# Transitive-chain allowlist:
#   * The 3 legitimate consumers (category/catalog/image) → ai_ops are
#     intra-spec edges that must NOT count when checking the OTHER 5
#     modules' compliance.
#   * `core.cache` → `app.modules.category.service` is the §4.D pre-warm
#     startup hook (locked at §4.D + `MVP_ARCH §6.7`) — `core/` legitimately
#     reaches into category at boot time.
# ============================================================================
[[tool.importlinter.contracts]]
name = "Contract 5 — ai_ops consumed only by category, catalog, image"
type = "forbidden"
source_modules = [
    "app.modules.iam",
    "app.modules.customer",
    "app.modules.pricing",
    "app.modules.dashboard",
    "app.modules.export",
]
forbidden_modules = ["app.ai_ops"]
unmatched_ignore_imports_alerting = "none"
ignore_imports = [
    # Legitimate ai_ops consumers per §6A.A — these edges MUST NOT count
    # against the other 5 modules' Contract 5 compliance.
    "app.modules.category.service -> app.ai_ops.client",
    "app.modules.category.service -> app.ai_ops.budget_cap",
    "app.modules.catalog.service -> app.ai_ops.client",
    "app.modules.catalog.service -> app.ai_ops.budget_cap",
    "app.modules.image.service -> app.ai_ops.client",
    "app.modules.image.service -> app.ai_ops.budget_cap",
    # image.tasks → ai_ops.client is the §11.E watermark Celery task per §6A.E
    # — image module's tasks.py is a legitimate ai_ops consumer.
    "app.modules.image.tasks -> app.ai_ops.client",
    "app.modules.image.tasks -> app.ai_ops.budget_cap",
    # §4.D pre-warm startup hook — core/cache reaches into category at boot.
    "app.core.cache -> app.modules.category.service",
    "app.core.cache -> app.shared.database",
]


