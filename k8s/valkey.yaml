# k8s/valkey.yaml
# ============================================================================
# DOCUMENTATION ONLY — DO NOT `kubectl apply` THIS FILE.
# ============================================================================
# Valkey is a Terraform-managed StatefulSet. Terraform owns the live resource
# (module.valkey_dev, see infra/terraform/modules/valkey/main.tf). This file
# mirrors the LIVE cluster state for human reference. Applying it would conflict
# with Terraform's StatefulSet and is forbidden by playbook §0.
#
# LIVE STATE (verified 2026-06-08):
#   kind:        StatefulSet (NOT Deployment)  — pod `valkey-0`, namespace `dev`
#   image:       valkey/valkey:8
#   service:     `valkey` (headless, clusterIP: None) on 6379
#   auth:        --requirepass $(VALKEY_PASSWORD) from `valkey-credentials` Secret
#   maxmemory:   128mb  (allkeys-lru) — matches Phase A A3 live verification
#                (valkey-cli config get maxmemory -> 134217728). The previous
#                value of 512mb in this file was stale and has been corrected.
#   resources:   requests cpu=100m mem=200Mi ; limits cpu=500m mem=512Mi
#                (left at live values; §20.G CPU target 200m/500m is documented
#                 below but live TF state is the SSOT — recorded D-flag D3)
#   storage:     ~2-5Gi PVC (volumeClaimTemplate `data`)
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: dev
spec:
  clusterIP: None
  selector:
    app: valkey
  ports:
    - port: 6379
      name: valkey
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: dev
spec:
  serviceName: valkey
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8
          args:
            - "--requirepass"
            - "$(VALKEY_PASSWORD)"
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "128mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-credentials
                  key: password
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["sh", "-c", 'valkey-cli -a "$VALKEY_PASSWORD" ping | grep PONG']
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
