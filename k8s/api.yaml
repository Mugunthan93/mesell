# k8s/api.yaml
# FastAPI API Deployment per BACKEND_ARCHITECTURE.md §20.G (resources),
# §20.F.1 (rolling update), §20.E.1 (readiness probe), §20.H (topology sketch).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Single-node dev VM (e2-standard-2, 2 vCPU) runs at ~92% CPU requests at
      # steady state, so there is no spare CPU to schedule a SURGE pod. The prior
      # maxSurge:1/maxUnavailable:0 (surge-before-kill) deadlocked the rollout:
      # the new replica stayed Pending ("Insufficient cpu") because both old
      # replicas still held their requests, and maxUnavailable:0 forbids killing
      # an old pod until the new one is Ready. Flip to kill-before-surge:
      # free one old pod's CPU first, then schedule the replacement into the gap.
      # (CI deploy run 27360475090 deadlocked here.)
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: asia-south1-docker.pkg.dev/project-1f5cbf72-2820-4cdb-949/meesell-prod-images/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: meesell-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: "200m"    # Reduced from 500m — dev single-node VM (2 vCPU total, shared with infra)
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15   # §20.E.1: prewarm_top_categories startup hook adds ~5s
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dev
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000
