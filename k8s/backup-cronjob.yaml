# k8s/backup-cronjob.yaml
# Nightly pg_dump of the dev database to GCS.
# Per §20.C, secret values come from `backend-secrets` (PGPASSWORD, GCS_BUCKET).
# Host `postgres` is the headless ClusterIP service in the dev namespace; it
# resolves to the postgres-0 StatefulSet pod.
# GCS auth: the google/cloud-sdk container uses ADC via the GCE metadata server
# (VM SA has storage.objectAdmin on gs://meesell-prod-assets per Phase A A2).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: dev
spec:
  # 02:00 IST = 20:30 UTC the previous day.
  schedule: "30 20 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: google/cloud-sdk:alpine
              envFrom:
                - secretRef:
                    name: backend-secrets   # supplies POSTGRES_PASSWORD + GCS_BUCKET per §20.C
              env:
                # backend-secrets exposes POSTGRES_PASSWORD; pg_dump expects PGPASSWORD.
                # Map it without re-reading the secret key by name (envFrom already
                # injected POSTGRES_PASSWORD into the environment).
                - name: PGPASSWORD
                  value: "$(POSTGRES_PASSWORD)"
              command:
                - "sh"
                - "-c"
                - >
                  apk add --no-cache postgresql-client &&
                  TS=$(date -u +%Y%m%d_%H%M%S) &&
                  pg_dump -h postgres -U meesell -d meesell -Fc -f /tmp/meesell_${TS}.dump &&
                  gsutil cp /tmp/meesell_${TS}.dump gs://${GCS_BUCKET}/backups/meesell_${TS}.dump
