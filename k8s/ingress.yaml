# k8s/ingress.yaml
# NOTE: TLS and cert-manager (ClusterIssuer) are intentionally disabled.
# The app currently runs on static IP 34.93.9.139 with no public domain.
# When a domain is registered, install cert-manager and apply
# k8s/bootstrap/clusterissuer.yaml, then re-enable TLS here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meesell
  namespace: meesell
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
