# k8s/ingress.yaml
# SUPERSEDED — Terraform now owns all Ingress resources.
# See: infra/terraform/modules/ingress/main.tf
# This file is kept for historical reference only. DO NOT apply.
#
# Original note: TLS and cert-manager (ClusterIssuer) were intentionally
# disabled. studio.mesell.xyz is now live with Let's Encrypt TLS via
# the Terraform ingress module. Additional subdomains (api, dev, testing,
# staging) are managed via kubernetes_ingress_v1 resources in the same module.
#
# Ingress resources (active):
#   studio.mesell.xyz  → supabase-studio:3000 (dev namespace)
#   api.mesell.xyz     → api:80 (dev namespace)
#   dev.mesell.xyz     → frontend:80 (dev namespace)
#   testing.mesell.xyz → frontend:80 (dev namespace)
#   staging.mesell.xyz → frontend:80 (staging namespace)
#
# Apply order: terraform apply -target=module.ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meesell
  namespace: dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
