# k8s/worker.yaml
# Celery worker Deployment per BACKEND_ARCHITECTURE.md §20.G (resources),
# §20.F.1 (rolling update), §20.B.3 (celery args), §20.H (topology sketch).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Single-node dev VM (e2-standard-2, 2 vCPU) is CPU-saturated at steady
      # state, so a SURGE pod cannot schedule. The prior maxSurge:1/maxUnavailable:0
      # deadlocked the CI rollout (new worker stayed Pending "Insufficient cpu").
      # Kill-before-surge frees an old pod's 250m before scheduling the new one.
      # (CI deploy run 27360475090 deadlocked here.)
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: asia-south1-docker.pkg.dev/project-1f5cbf72-2820-4cdb-949/meesell-prod-images/api:latest
          imagePullPolicy: Always
          command: ["celery"]
          args:
            - "-A"
            - "app.workers.celery_app"
            - "worker"
            - "--loglevel=info"
            # image-precheck Feature 5: concurrency=4 per FEATURE_PLAN §Infra row 4
            # (8s/image × 4 = 32s budget/min × 60 ≈ 7,500 images/hr capacity).
            - "--concurrency=4"
            - "--max-tasks-per-child=100"
          envFrom:
            - configMapRef:
                name: meesell-config
            - secretRef:
                name: backend-secrets
          # QUEUE ROUTING — image-tasks (image-precheck Feature 5, FEATURE_PLAN §Infra row 4):
          #   The feature plan asks for a dedicated `image-tasks` queue at concurrency=4.
          #   As-built reality (verified 2026-06-12): celery_app.py has NO task_routes /
          #   task_queues config, and the `image.precheck` @shared_task
          #   (modules/image/tasks.py:415) carries no queue= kwarg — so it publishes to the
          #   DEFAULT `celery` queue. This worker (no -Q) consumes that default queue, so the
          #   pipeline works today at concurrency=4.
          #   Adding `-Q image-tasks` HERE NOW would BREAK the pipeline: the worker would
          #   consume only `image-tasks` while tasks still publish to `celery`. The split
          #   requires a BACKEND change first (task_routes `image.precheck -> image-tasks`
          #   in celery_app.py) — an infra↔backend inter-lead dependency
          #   (memo handoff_image_tasks_queue.md). After backend lands task_routes,
          #   uncomment in a follow-up infra micro-feature:
          #     - "-Q"
          #     - "image-tasks"
          #
          # NOTE (pre-existing): celery_app.py INCLUDE list locked to
          # [image.tasks, export.tasks] per §18.B. Workers process both task modules.
          # NOTE: GOOGLE_APPLICATION_CREDENTIALS absent — ADC via GCE metadata server
          # (VM SA 888244156264-compute@... has storage.objectAdmin on
          # gs://meesell-prod-assets per Phase A A2). If Workload Identity is later
          # configured on K3s, annotate the K8s ServiceAccount instead.
          resources:
            requests:
              cpu: "250m"    # Reduced from 1000m — dev single-node VM (2 vCPU total, shared with infra)
              memory: "512Mi"  # Reduced from 1Gi — dev environment
            limits:
              cpu: "1000m"
              memory: "1Gi"
