apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: meesell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: asia-south1-docker.pkg.dev/REPLACE-PROJECT-ID/meesell/api:latest
          imagePullPolicy: Always
          command:
            - "celery"
            - "-A"
            - "app.workers.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=2"
            - "-Q"
            - "images,generation"
          envFrom:
            - configMapRef:
                name: meesell-config
            - secretRef:
                name: meesell-secrets
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "1.5Gi"
