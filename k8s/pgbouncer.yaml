# k8s/pgbouncer.yaml
# ============================================================================
# PgBouncer — transaction-pool connection multiplexer in front of Postgres.
# MS-0 / D5 step 1 (infra plan §3.3 item 2, MS-DB-4). DEV NAMESPACE ONLY.
# ============================================================================
# WHY: after microservicing, the naive per-service pool budget is ~360 backend
# connections (infra plan §3.3) — far over even the raised max_connections=200.
# PgBouncer in `pool_mode=transaction` multiplexes many app-side connections
# onto a small pool of real Postgres backends (here: 20 default + 5 reserve),
# so the 8 services + workers can open hundreds of logical connections while
# Postgres only ever sees a handful. This is the D5 PREREQUISITE — it MUST be
# live and validated before ANY service cutover flip routes its DATABASE_URL at
# pgbouncer:6432 (the flip itself is a founder-gated step, see the PR runbook).
#
# CONVENTION: this is an APPLICATION-tier workload (a Deployment, not a TF
# StatefulSet). It is owned by k8s/ manifests + the CI deploy lane, NOT by
# Terraform (unlike postgres/valkey which are TF-managed bootstrap datastores).
# Apply via the playbook §15 safe-deploy template (server dry-run gate first).
#
# SECRET: the userlist (DB credentials) is NOT in this file. It lives in the
# k8s Secret `pgbouncer-userlist` (see k8s/pgbouncer-userlist.secret.yaml.example
# for the template + populate procedure, playbook §10 discipline). The password
# MUST match `postgres-credentials` (the value the postgres StatefulSet was
# created with).
#
# AUTH MODE: this config uses plain `auth_type=md5` with a userlist.txt that
# carries the `meesell` role + its md5 hash. `auth_query` (asking Postgres for
# the hash) is the alternative but needs a dedicated lookup role + pg_shadow
# grant — deferred; for V1 dev the static userlist is simpler and sufficient.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: dev
  labels:
    app: pgbouncer
data:
  pgbouncer.ini: |
    [databases]
    # Per-database pool sizing. Today the monolith DB `meesell` is the only entry.
    # DESIGNED TO BE ADDITIVE: as each service gets its own DB role / search_path
    # (infra plan §3.1 schema-per-service), add a line here, e.g.:
    #   svc_catalog = host=postgres.dev.svc.cluster.local port=5432 dbname=meesell pool_size=10
    # The `meesell` entry below stays for the monolith until the last service flips.
    meesell = host=postgres.dev.svc.cluster.local port=5432 dbname=meesell pool_size=20 reserve_pool=5

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432

    # --- Transaction pooling (infra plan §3.3 item 2) ---
    # A backend connection is returned to the pool at COMMIT/ROLLBACK, not at
    # client disconnect. This is what lets hundreds of app connections share a
    # handful of real Postgres backends. CAVEAT (R-MS-8): forbids session-level
    # state across transactions — see the asyncpg/SQLAlchemy note in the PR body
    # and handoff_d5_pgbouncer_backend.md (statement_cache_size=0 etc.).
    pool_mode = transaction

    # Real Postgres-side backends this pooler may open at most (per db pool_size
    # above + this ceiling). 25 real backends << max_connections=200 -> ample
    # headroom for the monolith + the postgres baseline + admin connections.
    max_client_conn = 1000
    default_pool_size = 20
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    max_db_connections = 25

    # Auth: static userlist (see Secret pgbouncer-userlist). md5 hashes only.
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt

    # Admin/stats access for `SHOW POOLS;` etc. (the `meesell` role is the only
    # user; it is granted stats+admin here for dev introspection during cutover).
    admin_users = meesell
    stats_users = meesell

    # Transaction-mode safety: server-side prepared statements are not reused
    # across pooled transactions. 0 = disable PgBouncer's own prepared-stmt cache
    # (asyncpg must ALSO set statement_cache_size=0 — backend handoff).
    max_prepared_statements = 0

    # Logging / lifecycle
    ignore_startup_parameters = extra_float_digits
    server_reset_query = DISCARD ALL
    log_connections = 0
    log_disconnections = 0
    server_idle_timeout = 600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: dev
  labels:
    app: pgbouncer
spec:
  # DEV replica count = 1 (JUSTIFIED). The infra plan says 2 for HA, but:
  #  - the e2-standard-2 dev node is CPU-bound (live: 1650m/2000m requested, ~350m
  #    free); a 2nd replica doubles CPU request for zero dev benefit.
  #  - PgBouncer is a single-threaded epoll proxy — one replica handles thousands
  #    of connections; HA at the pooler is a PROD concern, not dev.
  # 2 replicas is the staging/prod target (raise there). ₹0 dev call: 1 replica.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          # edoburu/pgbouncer: file-driven config (mounts pgbouncer.ini + userlist.txt),
          # matches our ConfigMap+Secret pattern. Pinned tag (no :latest).
          image: edoburu/pgbouncer:1.23.1
          ports:
            - containerPort: 6432
              name: pgbouncer
          resources:
            requests:
              cpu: "25m"      # tiny — epoll proxy, near-idle in dev
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: pgbouncer-userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
              readOnly: true
      volumes:
        - name: pgbouncer-config
          configMap:
            name: pgbouncer-config
        - name: pgbouncer-userlist
          secret:
            secretName: pgbouncer-userlist
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: dev
  labels:
    app: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 6432
      targetPort: 6432
      name: pgbouncer
