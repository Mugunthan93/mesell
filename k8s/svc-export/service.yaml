# k8s/svc-export/service.yaml
# ---------------------------------------------------------------------------
# svc-export — Sub-Plan A (export extraction), INFRA deliverable I3.
#
# ClusterIP Service `svc-export` on port 8001 → the svc-export-api pod's :8001.
# Authority: handoff_msA_infra.md §1 I3 + MASTER_PLAN §2.C (gateway targets
# `svc-export:8001`).
#
# The Service selects ONLY the api component (app=svc-export, component=api) —
# the worker has no HTTP listener and must NOT receive cluster traffic.
#
# Traffic paths into this Service:
#   - North-south (external): Traefik IngressRoute (I4) → svc-export:8001 for the
#     two public export routes.
#   - East-west (internal):  K3s cluster DNS svc-export.dev.svc.cluster.local:8001
#     for the /internal/* endpoints (NOT exposed by Traefik — MASTER_PLAN §2.C;
#     absence of an IngressRoute for /internal/* is the V1.5 isolation primitive).
#
# Port note: unlike the monolith `api` Service (port 80 → 8000), svc-export uses
# 8001 on BOTH the Service port and the targetPort, matching the gateway map's
# `svc-export:8001` literal so east-west callers dial one consistent port.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: svc-export
  namespace: dev
  labels:
    app: svc-export
spec:
  type: ClusterIP
  selector:
    app: svc-export
    component: api
  ports:
    - name: http
      port: 8001
      targetPort: 8001
