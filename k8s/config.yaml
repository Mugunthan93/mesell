# k8s/config.yaml
# Non-secret application configuration per BACKEND_ARCHITECTURE.md §5.D.
# Secrets (passwords, API keys, tokens) live in the `backend-secrets` k8s Secret
# (see secrets.yaml.example), sourced from GCP Secret Manager. NEVER put a secret
# value in this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: meesell-config
  namespace: dev
data:
  # App
  # Dev ConfigMap (namespace: dev) MUST be "development". Founder ruling 2026-06-11
  # (F1 resolved): "production" here was WRONG. Valid Pydantic Settings Literal values:
  # {development, staging, production}. Staging overlay carries its own APP_ENV=staging.
  APP_ENV: "development"

  # Database pool (non-secret tuning)
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "5"
  DB_POOL_RECYCLE: "1800"
  DB_ECHO: "false"

  # JWT / Auth (non-secret tuning)
  # TTLs are per-environment (BACKEND_ARCHITECTURE.md §5.D). This base ConfigMap is the
  # `dev` namespace surface, so it carries DEV values. The staging overlay
  # (k8s/overlays/staging/) patches these to staging values (60 / 300). Prod values
  # (900 / 604800) land with the V1.5 prod namespace.
  #   dev:     ACCESS=30   REFRESH=120
  #   staging: ACCESS=60   REFRESH=300   (overlay patch)
  #   prod:    ACCESS=900  REFRESH=604800 (V1.5)
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_TTL_SECONDS: "30"
  REFRESH_TOKEN_TTL_SECONDS: "120"

  # CORS (per §4.G — NEVER use "*"). FE-D5: refresh cookie is sent only from the
  # frontend origin, so dev CORS is scoped to the dev frontend origin. The staging
  # overlay swaps this to the staging origin.
  CORS_ALLOWED_ORIGINS: "https://dev.mesell.xyz"
  CORS_ALLOW_CREDENTIALS: "true"

  # Gemini
  GEMINI_MODEL: "gemini-2.5-flash"

  # GCS (non-secret: bucket name + project). Single-bucket model per Phase A SSOT.
  GCS_BUCKET: "meesell-prod-assets"
  GCS_PROJECT_ID: "project-1f5cbf72-2820-4cdb-949"
  GCS_SIGNED_URL_TTL_SECONDS: "3600"
  # Product-image bucket (image-precheck Feature 5). Separate from GCS_BUCKET above —
  # a dedicated bucket with a 1-year DELETE lifecycle (infra/terraform/modules/gcs_images).
  # Live in GCP since 2026-06-12. Backend reads via GCS_BUCKET_IMAGES.
  GCS_BUCKET_IMAGES: "meesell-images"

  # Feature flags (repo MASTER §3.2). Dev defaults = true so the dev namespace
  # exercises each feature end-to-end. The staging overlay sets these to false until
  # each feature's soak gates pass (per each feature plan's D2). When a feature ships
  # to main its flag is removed (cleanup-flag-* follow-up branch).
  FEATURE_SMART_PICKER_ENABLED: "true"
  FEATURE_CATALOG_FORM_ENABLED: "true"
  FEATURE_AI_AUTOFILL_ENABLED: "true"
  FEATURE_IMAGE_PRECHECK_ENABLED: "true"
  FEATURE_XLSX_EXPORT_ENABLED: "true"

  # LangFuse (public key is non-secret per §5.D; secret key is in backend-secrets)
  LANGFUSE_PUBLIC_KEY: "pk-lf-disabled-v1"
  LANGFUSE_HOST: "https://cloud.langfuse.com"

  # AI Ops budget
  AI_DAILY_BUDGET_INR: "500"
  AI_BUDGET_ALARM_THRESHOLD: "0.80"

  # Cache version (bumped on quarterly Meesho refresh)
  CACHE_VERSION: "v1"

  # Rate limits
  RL_PER_IP_PER_MINUTE: "120"
