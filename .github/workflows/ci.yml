# .github/workflows/ci.yml
#
# MeeSell — GitHub Actions CI/CD pipeline
# Spec: docs/DEVOPS_ARCHITECTURE.md §5 (CI), §6 (build), §7 (deploy), §9 (frontend matrix)
#
# Triggers:
#   push to main           → 5 backend CI gates + frontend matrix → build → deploy to dev
#   pull_request to main   → 5 backend CI gates + frontend matrix only (no build, no deploy)
#   schedule (nightly)     → slow/perf + ai_eval (no CI gates, no build, no deploy)
#
# Backend CI gates (sequential — each needs its predecessor; fast-fail at gate 1 cancels the rest):
#   1. unit              pytest -m "unit"            no services    < 30s
#   2. smoke             pytest -m "smoke"           no services    < 10s
#   3. lint              import-linter + 3 AST       no services    < 60s   (BACKEND_ARCHITECTURE.md §16.E)
#   4. integration       pytest -m "integration"     postgres+valkey ~3 min
#   5. golden_roundtrip  pytest -m "golden_roundtrip" postgres+valkey ~1 min
#
# Frontend CI (federated workspace — GATE4_CONFIRMATION.md C-CI-1, replaces the old
# single-frontend conditional). Runs IN PARALLEL with the backend gates (frontend is
# independent of the backend test gates):
#   frontend-changes  dorny/paths-filter — computes which workspace units changed
#   frontend-build    paths-filtered MATRIX over { shell, mfe-pricing (pilot), ... }
#                     A frontend/libs/** change FANS OUT to every dependent unit
#                     (shell + all remotes) because libs are consumed via @mesell/*
#                     path aliases and are NOT independently built artefacts.
#                     Adding remotes SP02–SP06 is a ONE-LINE addition in two places
#                     (the paths-filter `filters:` block + the matrix `include:` list).
#
# Required GitHub repository variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_WIF_PROVIDER  — terraform output github_wif_provider_name (after `terraform apply`)
#   GCP_CI_SA_EMAIL   — terraform output github_ci_sa_email       (after `terraform apply`)
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   GEMINI_API_KEY_CI — low-quota Gemini key for nightly ai_eval (NOT the production key)
#
# No NEW secrets are introduced by the frontend matrix (no GCP auth — it builds/tests in the
# runner only; image build + GCS publish for the shell/remotes land in cloudbuild at activation).
# No service account JSON keys stored anywhere. All GCP auth uses Workload Identity Federation.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # 01:00 UTC = 06:30 IST. Runs the nightly suite once per day.
    - cron: '0 1 * * *'

# Shared env across every CI gate. Dummy / test-safe values only — production secrets
# are NEVER injected into GitHub Actions (see DEVOPS_ARCHITECTURE.md §8.2).
env:
  PYTHONUNBUFFERED: "1"
  # Account-locked targets (DEVOPS_ARCHITECTURE.md §1.2).
  PROJECT_ID: project-1f5cbf72-2820-4cdb-949
  REGION: asia-south1
  REPO: meesell-prod-images
  REGISTRY: asia-south1-docker.pkg.dev
  VM_ZONE: asia-south1-a
  VM_NAME: meesell-dev
  NAMESPACE: dev

jobs:

  # =============================================================================
  # GATE 1 — unit
  # Pure-function tests, no I/O. Fast (< 30s). Failure here cancels every downstream job.
  # =============================================================================
  unit:
    name: "CI Gate 1: unit"
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 5
    env:
      SECRET_KEY: ci-dummy-secret-key
      JWT_SECRET: ci-dummy-jwt-secret
      MSG91_AUTH_KEY: ci-dummy-msg91-auth-key
      MSG91_TEMPLATE_ID: ci-dummy-template-id
      RAZORPAY_KEY_ID: ci-dummy-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-dummy-razorpay-key-secret
      RAZORPAY_WEBHOOK_SECRET: ci-dummy-razorpay-webhook
      REFRESH_TOKEN_PEPPER: ci-dummy-refresh-pepper
      AUDIT_PII_SALT: ci-dummy-audit-pii-salt
      GEMINI_API_KEY: ci-dummy-gemini-key
      # §5.D startup-guard required vars (app.shared.config REQUIRED_FIELDS).
      # unit/smoke run no service containers, so DATABASE_URL/VALKEY_URL are
      # dummy DSNs — the guard only checks non-empty (it does NOT connect at
      # import time); unit/smoke tests are no-service by marker.
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_dummy
      VALKEY_URL: redis://localhost:6379/0
      GCS_BUCKET: ci-dummy-bucket
      GCS_PROJECT_ID: ci-dummy-gcs-project
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_ENV: development
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest -m "unit"
        working-directory: backend
        run: pytest -m "unit" -v

  # =============================================================================
  # GATE 2 — smoke
  # FastAPI boot + DB-schema-shape assertions. No services needed (uses dummy env).
  # =============================================================================
  smoke:
    name: "CI Gate 2: smoke"
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name != 'schedule'
    timeout-minutes: 5
    env:
      SECRET_KEY: ci-dummy-secret-key
      JWT_SECRET: ci-dummy-jwt-secret
      MSG91_AUTH_KEY: ci-dummy-msg91-auth-key
      MSG91_TEMPLATE_ID: ci-dummy-template-id
      RAZORPAY_KEY_ID: ci-dummy-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-dummy-razorpay-key-secret
      RAZORPAY_WEBHOOK_SECRET: ci-dummy-razorpay-webhook
      REFRESH_TOKEN_PEPPER: ci-dummy-refresh-pepper
      AUDIT_PII_SALT: ci-dummy-audit-pii-salt
      GEMINI_API_KEY: ci-dummy-gemini-key
      # §5.D startup-guard required vars (app.shared.config REQUIRED_FIELDS).
      # smoke boots FastAPI with no service containers, so DATABASE_URL/VALKEY_URL
      # are dummy DSNs — the guard only checks non-empty (does NOT connect at
      # import time).
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_dummy
      VALKEY_URL: redis://localhost:6379/0
      GCS_BUCKET: ci-dummy-bucket
      GCS_PROJECT_ID: ci-dummy-gcs-project
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_ENV: development
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: pytest -m "smoke"
        working-directory: backend
        run: pytest -m "smoke" -v

  # =============================================================================
  # GATE 3 — lint
  # 10 CI linter contracts (BACKEND_ARCHITECTURE.md §16.E hard rule).
  # Contracts 1-7 via import-linter; Contracts 8-10 via AST scanners.
  # =============================================================================
  lint:
    name: "CI Gate 3: lint (10 contracts)"
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name != 'schedule'
    timeout-minutes: 5
    env:
      SECRET_KEY: ci-dummy-secret-key
      # §5.D startup-guard required vars. import-linter (Contracts 1-7,
      # root_package="app") builds its graph via grimp, which IMPORTS every
      # module under app — including app.shared.config, whose module-level
      # `settings = _load_settings()` runs the §5.D guard at import time. So the
      # lint gate needs the FULL required set, not just SECRET_KEY/APP_ENV.
      # (The 3 AST scanners — Contracts 8-10 — parse statically and don't need
      # them, but Contracts 1-7 in the same job do.) No service containers here,
      # so DATABASE_URL/VALKEY_URL are dummy DSNs (guard checks non-empty only).
      JWT_SECRET: ci-dummy-jwt-secret
      MSG91_AUTH_KEY: ci-dummy-msg91-auth-key
      MSG91_TEMPLATE_ID: ci-dummy-template-id
      RAZORPAY_KEY_ID: ci-dummy-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-dummy-razorpay-key-secret
      RAZORPAY_WEBHOOK_SECRET: ci-dummy-razorpay-webhook
      REFRESH_TOKEN_PEPPER: ci-dummy-refresh-pepper
      AUDIT_PII_SALT: ci-dummy-audit-pii-salt
      GEMINI_API_KEY: ci-dummy-gemini-key
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_dummy
      VALKEY_URL: redis://localhost:6379/0
      GCS_BUCKET: ci-dummy-bucket
      GCS_PROJECT_ID: ci-dummy-gcs-project
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_ENV: development
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: "Contracts 1-7: import-linter"
        working-directory: backend
        run: lint-imports --config tests/lint/import_rules.toml

      - name: "Contract 8: repository methods scoped to user_id"
        working-directory: backend
        run: python tests/lint/check_scope_to_user.py

      - name: "Contract 9: no Meesho symbols outside export module"
        working-directory: backend
        run: python tests/lint/check_no_meesho_symbols_outside_export.py

      - name: "Contract 10: i18n message-id regex"
        working-directory: backend
        run: python tests/lint/check_message_id_regex.py

  # =============================================================================
  # GATE 4 — integration
  # pytest -m "integration" against real Postgres 16 + Valkey 8 in service containers.
  # =============================================================================
  integration:
    name: "CI Gate 4: integration"
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'schedule'
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meesell
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meesell_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U meesell -d meesell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://meesell:password@localhost:5433/meesell_test
      TEST_VALKEY_URL: redis://localhost:6381/0
      DATABASE_URL: postgresql+asyncpg://meesell:password@localhost:5433/meesell_test
      VALKEY_URL: redis://localhost:6381/0
      SECRET_KEY: ci-dummy-secret-key
      JWT_SECRET: ci-dummy-jwt-secret
      MSG91_AUTH_KEY: ci-dummy-msg91-auth-key
      MSG91_TEMPLATE_ID: ci-dummy-template-id
      RAZORPAY_KEY_ID: ci-dummy-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-dummy-razorpay-key-secret
      RAZORPAY_WEBHOOK_SECRET: ci-dummy-razorpay-webhook
      REFRESH_TOKEN_PEPPER: ci-dummy-refresh-pepper
      AUDIT_PII_SALT: ci-dummy-audit-pii-salt
      GEMINI_API_KEY: ci-dummy-gemini-key
      # §5.D startup-guard required vars not already provided above. DATABASE_URL
      # and VALKEY_URL come from the service-container block above; these 5 close
      # the remaining gap so the config guard passes.
      GCS_BUCKET: ci-dummy-bucket
      GCS_PROJECT_ID: ci-dummy-gcs-project
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_ENV: development

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: pytest -m "integration"
        working-directory: backend
        run: pytest -m "integration" -v

  # =============================================================================
  # GATE 5 — golden_roundtrip
  # 15 XLSX round-trip fixtures (BACKEND_ARCHITECTURE.md §14.K). Final CI gate.
  # =============================================================================
  golden_roundtrip:
    name: "CI Gate 5: golden_roundtrip"
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name != 'schedule'
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meesell
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meesell_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U meesell -d meesell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://meesell:password@localhost:5433/meesell_test
      TEST_VALKEY_URL: redis://localhost:6381/0
      DATABASE_URL: postgresql+asyncpg://meesell:password@localhost:5433/meesell_test
      VALKEY_URL: redis://localhost:6381/0
      SECRET_KEY: ci-dummy-secret-key
      JWT_SECRET: ci-dummy-jwt-secret
      MSG91_AUTH_KEY: ci-dummy-msg91-auth-key
      MSG91_TEMPLATE_ID: ci-dummy-template-id
      RAZORPAY_KEY_ID: ci-dummy-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-dummy-razorpay-key-secret
      RAZORPAY_WEBHOOK_SECRET: ci-dummy-razorpay-webhook
      REFRESH_TOKEN_PEPPER: ci-dummy-refresh-pepper
      AUDIT_PII_SALT: ci-dummy-audit-pii-salt
      GEMINI_API_KEY: ci-dummy-gemini-key
      # §5.D startup-guard required vars not already provided above. DATABASE_URL
      # and VALKEY_URL come from the service-container block above; these 5 close
      # the remaining gap so the config guard passes.
      GCS_BUCKET: ci-dummy-bucket
      GCS_PROJECT_ID: ci-dummy-gcs-project
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_ENV: development

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: pytest -m "golden_roundtrip"
        working-directory: backend
        run: pytest -m "golden_roundtrip" -v

  # =============================================================================
  # FRONTEND-CHANGES — paths-filter for the federated Angular workspace (C-CI-1)
  # Computes which workspace units changed so the frontend-build matrix only builds
  # what is affected. Runs in PARALLEL with the backend gates.
  #
  # Dependency model (MASTER_PLAN §6.1 + GATE4_CONFIRMATION.md A2):
  #   frontend/libs/**  -> shared layers (@mesell/{ui-kit,composites,core,design-tokens})
  #                        consumed by EVERY unit via tsconfig path aliases. A libs change
  #                        is NOT an independently-built unit; it FANS OUT to all dependents.
  #   frontend/src/**   -> the shell (host) — angular.json project `frontend`.
  #   frontend/apps/mfe-pricing/**  -> the pilot remote (SP01). SP02–SP06 remotes each add
  #                        one filter line here + one matrix include entry below.
  #
  # The `libs` filter also matches workspace-wide config (package.json, pnpm-lock.yaml,
  # pnpm-workspace.yaml, angular.json, tsconfig*, federation.config.js) because a change to
  # any of those can affect every unit — so they trigger the full fan-out, same as libs.
  # =============================================================================
  frontend-changes:
    name: "Frontend: detect changed workspace units"
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    outputs:
      libs: ${{ steps.filter.outputs.libs }}
      shell: ${{ steps.filter.outputs.shell }}
      mfe_pricing: ${{ steps.filter.outputs.mfe_pricing }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute changed units
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # On push, diff against the previous commit; on PR, against the base ref.
          filters: |
            libs:
              - 'frontend/libs/**'
              - 'frontend/package.json'
              - 'frontend/pnpm-lock.yaml'
              - 'frontend/pnpm-workspace.yaml'
              - 'frontend/angular.json'
              - 'frontend/tsconfig*.json'
              - 'frontend/federation.config.js'
              - '.github/workflows/ci.yml'
            shell:
              - 'frontend/src/**'
              - 'frontend/public/**'
            mfe_pricing:
              - 'frontend/apps/mfe-pricing/**'
            # SP02–SP06: add one block per remote, e.g.
            # mfe_catalog:
            #   - 'frontend/apps/mfe-catalog/**'

  # =============================================================================
  # FRONTEND-BUILD — paths-filtered MATRIX over the federated workspace (C-CI-1)
  # REPLACES the old single-frontend `build-frontend` conditional (per GATE4 C-CI-1:
  # "replace, not extend" when the multi-project Angular workspace lands).
  #
  # Each matrix entry is one independently-buildable unit (the shell, or a remote).
  # A unit is built/tested when EITHER its own filter fired OR the `libs` fan-out fired
  # (a shared-layer change rebuilds every dependent). The whole job is skipped cleanly
  # when no frontend unit changed (matrix is empty -> job is a no-op success).
  #
  # Native-federation note (MASTER_PLAN §6 / SP0 federation.config.js): `ng build` on the
  # shell `frontend` project emits federated ESM (per-module), not a classic bundle. The
  # libs are NOT separate build targets — they compile INTO each consuming unit via the
  # @mesell/* path aliases, which is exactly why a libs change fans out.
  #
  # Adding a remote (SP02–SP06) = add ONE include entry below + ONE filter block above.
  # =============================================================================
  frontend-build:
    name: "Frontend: ${{ matrix.unit }}"
    runs-on: ubuntu-latest
    needs: frontend-changes
    if: github.event_name != 'schedule'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- shell (host) — angular.json project `frontend` ---
          - unit: shell
            project: frontend
            # Build when src/ changed OR a shared layer / workspace config changed.
            run: ${{ needs.frontend-changes.outputs.shell == 'true' || needs.frontend-changes.outputs.libs == 'true' }}
          # --- pilot remote (SP01) — angular.json project `mfe-pricing` ---
          - unit: mfe-pricing
            project: mfe-pricing
            # Build when this remote changed OR a shared layer / workspace config changed.
            run: ${{ needs.frontend-changes.outputs.mfe_pricing == 'true' || needs.frontend-changes.outputs.libs == 'true' }}
          # --- SP02–SP06 remotes: copy the mfe-pricing block, e.g. ---
          # - unit: mfe-catalog
          #   project: mfe-catalog
          #   run: ${{ needs.frontend-changes.outputs.mfe_catalog == 'true' || needs.frontend-changes.outputs.libs == 'true' }}
    steps:
      - name: "Skip notice (unit not affected)"
        if: matrix.run != 'true'
        run: echo "No change affecting '${{ matrix.unit }}' — nothing to build."

      - name: Checkout source
        if: matrix.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        if: matrix.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        if: matrix.run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.2"

      - name: pnpm install (frozen lockfile)
        if: matrix.run == 'true'
        working-directory: frontend
        # NOTE (handoff from frontend-coordinator): the `.npmrc dangerously-allow-all-builds`
        # trick is environment-blocked. The clean alternative is an explicit `pnpm rebuild`
        # of the native packages whose build scripts pnpm ignores by default
        # (ERR_PNPM_IGNORED_BUILDS: esbuild / @parcel/watcher / lmdb / msgpackr-extract).
        run: pnpm install --frozen-lockfile

      - name: pnpm rebuild native binaries
        if: matrix.run == 'true'
        working-directory: frontend
        # Forces the ignored native build scripts to run so esbuild et al. extract their
        # platform binaries — without this `ng build` fails on a fresh CI checkout.
        run: pnpm rebuild esbuild @parcel/watcher lmdb msgpackr-extract

      - name: "Test: ${{ matrix.unit }}"
        if: matrix.run == 'true'
        working-directory: frontend
        # Per-project headless unit tests. `--browsers=ChromeHeadless --watch=false` keeps CI
        # non-interactive. If a project defines no test target yet this is a fast no-op.
        run: pnpm exec ng test ${{ matrix.project }} --browsers=ChromeHeadless --watch=false || echo "No test target for ${{ matrix.project }} (yet) — skipping."

      - name: "Build: ${{ matrix.unit }}"
        if: matrix.run == 'true'
        working-directory: frontend
        # Native-federation build for this single project. Emits federated ESM for the shell
        # and per-remote `remoteEntry.json` + chunks for remotes.
        run: pnpm exec ng build ${{ matrix.project }} --configuration production

  # =============================================================================
  # BUILD — Docker images via Cloud Build
  # Runs ONLY on push to main, after all 5 backend CI gates + the frontend matrix pass.
  # See cloudbuild.yaml + DEVOPS_ARCHITECTURE.md §6.
  # =============================================================================
  build:
    name: "Build container images"
    runs-on: ubuntu-latest
    needs: [unit, smoke, lint, integration, golden_roundtrip, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    permissions:
      contents: read
      # Required for OIDC token exchange with GCP Workload Identity Federation.
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build job
        # `--no-source` tells Cloud Build NOT to upload the runner workspace; cloudbuild.yaml
        # has its own `git clone` step that pulls the repo on the Cloud Build worker.
        run: |
          gcloud builds submit --no-source \
            --config=cloudbuild.yaml \
            --project=${{ env.PROJECT_ID }} \
            --substitutions=_PROJECT_ID=${{ env.PROJECT_ID }},_REGION=${{ env.REGION }},_REPO=${{ env.REPO }},_TAG=${{ github.sha }} \
            --timeout=1800s

  # =============================================================================
  # DEPLOY — Rolling deploy to dev namespace via IAP TCP tunnel
  # Runs ONLY on push to main, after build succeeds.
  # See DEVOPS_ARCHITECTURE.md §7.
  # =============================================================================
  deploy:
    name: "Deploy to K3s (dev namespace)"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Install IAP tunnel + beta components
        run: gcloud components install beta --quiet

      - name: Rolling deploy via IAP SSH
        # IAP-tunneled SSH — no public port 6443, OIDC WIF for the SA, scoped IAM
        # (roles/iap.tunnelResourceAccessor + roles/compute.instanceAdmin.v1 on the VM).
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --tunnel-through-iap \
            --project=${{ env.PROJECT_ID }} \
            --command="
              set -euxo pipefail
              IMAGE_TAG=${{ github.sha }}
              API_IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:\${IMAGE_TAG}
              FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:\${IMAGE_TAG}

              # 1. Refresh the manifest checkout on the VM so any k8s/*.yaml change ships.
              if [ -d ~/mesell/.git ]; then
                git -C ~/mesell fetch origin main
                git -C ~/mesell reset --hard origin/main
              else
                git clone --depth=1 https://github.com/Mugunthan93/mesell.git ~/mesell
              fi

              # 2. Apply ConfigMap + Deployment shapes (idempotent).
              kubectl apply -f ~/mesell/k8s/config.yaml
              kubectl apply -f ~/mesell/k8s/api.yaml
              kubectl apply -f ~/mesell/k8s/worker.yaml
              # Frontend Deployment is applied only when frontend/Dockerfile + image exist.
              if [ -f ~/mesell/frontend/Dockerfile ]; then
                kubectl apply -f ~/mesell/k8s/frontend.yaml
              fi

              # 3. Migrate the schema on the CURRENT api pod BEFORE rolling the new image.
              kubectl exec -n ${{ env.NAMESPACE }} deploy/api -- alembic upgrade head

              # 4. Roll the new images.
              kubectl -n ${{ env.NAMESPACE }} set image deployment/api    api=\${API_IMAGE}
              kubectl -n ${{ env.NAMESPACE }} set image deployment/worker worker=\${API_IMAGE}
              if [ -f ~/mesell/frontend/Dockerfile ]; then
                kubectl -n ${{ env.NAMESPACE }} set image deployment/frontend frontend=\${FRONTEND_IMAGE}
              fi

              # 5. Wait for rollouts.
              kubectl -n ${{ env.NAMESPACE }} rollout status deployment/api    --timeout=180s
              kubectl -n ${{ env.NAMESPACE }} rollout status deployment/worker --timeout=180s
              if [ -f ~/mesell/frontend/Dockerfile ]; then
                kubectl -n ${{ env.NAMESPACE }} rollout status deployment/frontend --timeout=180s
              fi

              # 6. Smoke check — fail and auto-rollback on non-200.
              sleep 5
              HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' https://api.mesell.xyz/health)
              if [ \"\${HTTP_CODE}\" != \"200\" ]; then
                echo \"Health check failed: HTTP \${HTTP_CODE}. Rolling back.\"
                kubectl -n ${{ env.NAMESPACE }} rollout undo deployment/api
                kubectl -n ${{ env.NAMESPACE }} rollout undo deployment/worker
                exit 1
              fi
              echo \"Deploy complete: \${IMAGE_TAG}\"
            "

  # =============================================================================
  # NIGHTLY — slow/perf + ai_eval, schedule-only
  # Fires only on the cron trigger. No build / no deploy.
  # See DEVOPS_ARCHITECTURE.md §5.5.
  # =============================================================================
  nightly:
    name: "Nightly: slow + perf + ai_eval"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meesell
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meesell_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U meesell -d meesell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://meesell:password@localhost:5433/meesell_test
      TEST_VALKEY_URL: redis://localhost:6381/0
      DATABASE_URL: postgresql+asyncpg://meesell:password@localhost:5433/meesell_test
      VALKEY_URL: redis://localhost:6381/0
      SECRET_KEY: ci-dummy-secret-key
      JWT_SECRET: ci-dummy-jwt-secret
      MSG91_AUTH_KEY: ci-dummy-msg91-auth-key
      MSG91_TEMPLATE_ID: ci-dummy-template-id
      RAZORPAY_KEY_ID: ci-dummy-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-dummy-razorpay-key-secret
      RAZORPAY_WEBHOOK_SECRET: ci-dummy-razorpay-webhook
      REFRESH_TOKEN_PEPPER: ci-dummy-refresh-pepper
      AUDIT_PII_SALT: ci-dummy-audit-pii-salt
      # §5.D startup-guard required vars not already provided above. DATABASE_URL
      # and VALKEY_URL come from the service-container block above; these 5 close
      # the remaining gap so the config guard passes.
      GCS_BUCKET: ci-dummy-bucket
      GCS_PROJECT_ID: ci-dummy-gcs-project
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_ENV: development
      # Real low-quota Gemini key for the ai_eval suite ONLY. CI-only — distinct
      # from the production key in GCP Secret Manager (see DEVOPS §8.1).
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_CI }}
      PYTEST_RUN_SLOW: "1"
      RUN_AI_EVAL: "1"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: pytest -m "slow or perf"
        working-directory: backend
        run: pytest -m "slow or perf" -v

      - name: pytest -m "ai_eval"
        working-directory: backend
        run: pytest -m "ai_eval" -v
