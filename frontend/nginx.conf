# frontend/nginx.conf — per §20.D
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip on — per §20.D
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/wasm font/woff2;
  gzip_min_length 1024;

  # SPA fallback — Angular router handles all routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html — NEVER cache; service worker manages updates (§16)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Service worker manifest — short cache so SW updates within 5 min
  location = /ngsw.json {
    add_header Cache-Control "no-cache";
  }

  # ngsw-worker.js — no cache (browser must always fetch latest)
  location = /ngsw-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed assets (main.[hash].js, styles.[hash].css, chunk-[hash].js)
  # 1-year immutable cache per §20.D (hashes change on every build)
  location ~* \.[0-9a-f]{8,}\.(js|css|mjs)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Assets directory (PWA icons, i18n JSON, fonts)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Font files
  location ~* \.(woff2|woff|ttf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Health check for K3s liveness probe
  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
